<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="donate_kart">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>donate_kart</title>
  <link rel="manifest" href="manifest.json">

  <!-- Razorpay Payment Gateway -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Razorpay Web Checkout Handler -->
  <script>
    // Global variable to store payment callbacks
    window.razorpayCallbacks = {};

    // Function to open Razorpay checkout from Flutter
    function openRazorpayCheckout(options) {
      console.log('Opening Razorpay checkout with options:', options);

      // Create a new Razorpay instance
      var rzp = new Razorpay({
        key: options.key,
        amount: options.amount,
        currency: options.currency,
        name: options.name,
        description: options.description,
        image: options.image,
        order_id: options.order_id,
        prefill: options.prefill,
        notes: options.notes,
        theme: options.theme,
        handler: function(response) {
          console.log('Payment success:', response);
          // Send success callback to Flutter
          if (window.razorpaySuccessCallback) {
            window.razorpaySuccessCallback(response);
          }
        },
        modal: {
          ondismiss: function() {
            console.log('Razorpay checkout dismissed');
            // Send dismiss callback to Flutter
            if (window.razorpayDismissCallback) {
              window.razorpayDismissCallback();
            }
          }
        }
      });

      // Handle errors
      rzp.on('payment.failed', function(response) {
        console.error('Payment failed:', response);
        // Send error callback to Flutter
        if (window.razorpayErrorCallback) {
          window.razorpayErrorCallback({
            code: response.error.code,
            description: response.error.description,
            source: response.error.source,
            reason: response.error.reason,
            metadata: response.error.metadata
          });
        }
      });

      // Open the checkout modal
      rzp.open();
    }

    // Alternative: Function to process payment using order API
    function createAndOpenOrder(orderData) {
      console.log('Creating order and opening checkout:', orderData);
      // This would typically call your backend to create an order first
      // Then open checkout with the order_id
      openRazorpayCheckout(orderData);
    }

    // Verify payment signature (optional, recommended for security)
    function verifyPaymentSignature(paymentData) {
      console.log('Verifying payment signature:', paymentData);
      // This should be called on your backend for security
      // Never verify signatures on client-side in production
      
      // Return verification result
      return {
        verified: true,
        message: 'Payment verified successfully'
      };
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.

    or to give the user feedback during the initialization process.

    * https://docs.flutter.dev/platform-integration/web/initialization

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
